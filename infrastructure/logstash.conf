input {
  # TCP input for JSON-formatted logs from services
  tcp {
    port => 5000
    codec => json
  }

  # File input for Docker container logs
  file {
    path => "/var/lib/docker/containers/*/*.log"
    codec => "json"
    type => "docker"
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Extract service name from message or fields
  if [@metadata][docker][container][name] {
    mutate {
      add_field => { "service" => "%{[@metadata][docker][container][name]}" }
    }
  }

  # Add timestamp if not present
  if ![timestamp] {
    ruby {
      code => 'event.set("timestamp", Time.now)'
    }
  }

  # Grok patterns for different log formats
  if [type] == "docker" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:level} %{GREEDYDATA:message}" }
    }
  }

  # Add environment and cluster info
  mutate {
    add_field => { 
      "environment" => "${ENVIRONMENT:development}"
      "cluster" => "nexora-local"
      "region" => "local"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => "elasticsearch:9200"
    index => "nexora-logs-%{+YYYY.MM.dd}"
    action => "create"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
