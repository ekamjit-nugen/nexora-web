apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  SERVICE_MESH: "consul"
  KONG_ADMIN_URL: "http://kong:8001"
  CONSUL_HOST: "consul.nexora-database.svc.cluster.local"
  CONSUL_PORT: "8500"
  
  # Database
  MONGODB_HOST: "mongodb.nexora-database.svc.cluster.local"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "nexora"
  
  # Redis
  REDIS_HOST: "redis.nexora-database.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Elasticsearch
  ELASTICSEARCH_HOST: "elasticsearch.nexora-database.svc.cluster.local"
  ELASTICSEARCH_PORT: "9200"
  
  # URLs
  API_GATEWAY_URL: "http://api-gateway:3005"
  REALTIME_SERVICE_URL: "http://realtime-service:3002"
  
  # JWT
  JWT_EXPIRY_ACCESS: "900"
  JWT_EXPIRY_REFRESH: "604800"
  
  # File Storage
  AWS_REGION: "us-east-1"
  S3_BUCKET: "nexora-files"
  
  # Email
  SENDGRID_FROM_EMAIL: "noreply@nexora.io"
  SENDGRID_FROM_NAME: "Nexora"
  MAILHOG_HOST: "mailhog.nexora.svc.cluster.local"
  MAILHOG_PORT: "1025"
  
  # AI Services
  OLLAMA_HOST: "http://ollama:11434"
  CLAUDE_API_ENDPOINT: "https://api.anthropic.com"
  
  # Monitoring
  PROMETHEUS_PUSHGATEWAY: "http://prometheus:9091"
  SENTRY_DSN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secrets
  namespace: nexora
type: Opaque
stringData:
  MONGODB_ROOT_PASSWORD: "change-me-in-production"
  MONGODB_USER: "nexora_app"
  MONGODB_PASSWORD: "change-me-in-production"
  
  REDIS_PASSWORD: "change-me-in-production"
  
  JWT_SECRET: "change-me-with-strong-secret-in-production"
  JWT_REFRESH_SECRET: "change-me-with-strong-secret-in-production"
  
  AWS_ACCESS_KEY_ID: "change-me-in-production"
  AWS_SECRET_ACCESS_KEY: "change-me-in-production"
  
  SENDGRID_API_KEY: "change-me-in-production"
  
  CLAUDE_API_KEY: "change-me-in-production"
  
  OAUTH_GOOGLE_CLIENT_ID: "change-me-in-production"
  OAUTH_GOOGLE_CLIENT_SECRET: "change-me-in-production"
  
  OAUTH_MICROSOFT_CLIENT_ID: "change-me-in-production"
  OAUTH_MICROSOFT_CLIENT_SECRET: "change-me-in-production"
