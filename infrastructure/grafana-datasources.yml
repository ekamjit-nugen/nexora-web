apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    isDefault: false
    jsonData:
      esVersion: 7
      logMessageField: message
      logLevelField: level
      timeField: timestamp
    version: 1
    editable: true

  - name: Consul
    type: grafana-googlecloud-datasource
    access: proxy
    url: http://consul:8500
    isDefault: false
    version: 1
    editable: true
