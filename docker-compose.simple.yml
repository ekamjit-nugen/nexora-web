version: '3.8'

services:
  # Database Layer - Essential Services
  mongodb:
    image: mongo:latest
    container_name: nexora-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: nexora_dev_password
    volumes:
      - ./data/mongodb-data:/data/db
      - ./infrastructure/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - nexora-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: nexora-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis-data:/data
    networks:
      - nexora-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Microservices
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: nexora-auth-service
    ports:
      - "3010:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SERVICE_PORT: 3001
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_auth?authSource=admin
      REDIS_URI: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_CALLBACK_URL: ${MICROSOFT_CALLBACK_URL:-}
      SAML_ENTRY_POINT: ${SAML_ENTRY_POINT:-}
      SAML_ISSUER: ${SAML_ISSUER:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      FRONTEND_URL: http://localhost:3003
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-20}
      OTP_LOCKOUT_MINUTES: ${OTP_LOCKOUT_MINUTES:-2}
      OTP_RATE_LIMIT_PER_HOUR: ${OTP_RATE_LIMIT_PER_HOUR:-100}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-1}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3001/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hr-service:
    build:
      context: ./services/hr-service
      dockerfile: Dockerfile
    container_name: nexora-hr-service
    ports:
      - "3020:3010"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HR_SERVICE_PORT: 3010
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_hr?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      AUTH_SERVICE_URL: http://auth-service:3001
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      FRONTEND_URL: http://localhost:3003
    depends_on:
      mongodb:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3010/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  attendance-service:
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    container_name: nexora-attendance-service
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ATTENDANCE_SERVICE_PORT: 3011
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_attendance?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3011/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  leave-service:
    build:
      context: ./services/leave-service
      dockerfile: Dockerfile
    container_name: nexora-leave-service
    ports:
      - "3012:3012"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LEAVE_SERVICE_PORT: 3012
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_leave?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3012/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  payroll-service:
    build:
      context: ./services/payroll-service
      dockerfile: Dockerfile
    container_name: nexora-payroll-service
    ports:
      - "3014:3014"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PAYROLL_SERVICE_PORT: 3014
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_payroll?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      AUTH_SERVICE_URL: http://auth-service:3001
      HR_SERVICE_URL: http://hr-service:3010
      ATTENDANCE_SERVICE_URL: http://attendance-service:3011
      LEAVE_SERVICE_URL: http://leave-service:3012
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3014/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  project-service:
    build:
      context: ./services/project-service
      dockerfile: Dockerfile
    container_name: nexora-project-service
    ports:
      - "3030:3020"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PROJECT_SERVICE_PORT: 3020
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_projects?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      TASK_SERVICE_URL: http://task-service:3021
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3020/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
    container_name: nexora-task-service
    ports:
      - "3031:3021"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      TASK_SERVICE_PORT: 3021
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_tasks?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      ATTENDANCE_SERVICE_URL: http://attendance-service:3011
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3021/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  policy-service:
    build:
      context: ./services/policy-service
      dockerfile: Dockerfile
    container_name: nexora-policy-service
    ports:
      - "3013:3013"
    environment:
      NODE_ENV: development
      POLICY_SERVICE_PORT: "3013"
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_policies?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3013/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - nexora-network

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: nexora-chat-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CHAT_SERVICE_PORT: 3002
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_chat?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      LLM_BASE_URL: http://host.docker.internal:7/v1/chat/completions
      LLM_MODEL: deepseek
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3100,http://192.168.1.21:3000,http://192.168.1.21:3003,http://192.168.1.21:3005,http://192.168.1.21:3100,http://192.168.29.218:3000,http://192.168.29.218:3003,http://192.168.29.218:3005,http://192.168.29.218:3100
      REDIS_URI: redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3002/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: nexora-ai-service
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AI_SERVICE_PORT: 3080
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      LLM_BASE_URL: http://host.docker.internal:7/v1/chat/completions
      LLM_MODEL: deepseek
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3080/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: nexora-media-service
    ports:
      - "3052:3052"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MEDIA_SERVICE_PORT: 3052
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_media?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-nexora-media}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3052/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: nexora-notification-service
    ports:
      - "3053:3053"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NOTIFICATION_SERVICE_PORT: 3053
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_notifications?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      REDIS_URI: redis://redis:6379
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-nexora-internal-key-change-in-production}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nexora.app}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3053/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  calling-service:
    build:
      context: ./services/calling-service
      dockerfile: Dockerfile
    container_name: nexora-calling-service
    ports:
      - "3051:3051"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CALLING_SERVICE_PORT: 3051
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_calling?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      STUN_SERVERS: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3100,http://192.168.1.21:3000,http://192.168.1.21:3003,http://192.168.1.21:3005,http://192.168.1.21:3100,http://192.168.29.218:3000,http://192.168.29.218:3003,http://192.168.29.218:3005,http://192.168.29.218:3100
      REDIS_URI: redis://redis:6379
      CHAT_SERVICE_URL: http://chat-service:3002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3051/api/v1/calls || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Bench Management Service
  bench-service:
    build:
      context: ./services/bench-service
      dockerfile: Dockerfile
    container_name: nexora-bench-service
    ports:
      - "3040:3030"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BENCH_SERVICE_PORT: 3030
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_bench?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      HR_SERVICE_URL: http://hr-service:3010
      PROJECT_SERVICE_URL: http://project-service:3020
      PAYROLL_SERVICE_URL: http://payroll-service:3014
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3030/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # IT Asset Management Service
  asset-service:
    build:
      context: ./services/asset-service
      dockerfile: Dockerfile
    container_name: nexora-asset-service
    ports:
      - "3041:3031"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ASSET_SERVICE_PORT: 3031
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_asset?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      HR_SERVICE_URL: http://hr-service:3010
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3031/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Knowledge Base / Wiki Service
  knowledge-service:
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile
    container_name: nexora-knowledge-service
    ports:
      - "3032:3032"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      KNOWLEDGE_SERVICE_PORT: 3032
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_knowledge?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      AI_SERVICE_URL: http://ai-service:3080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3032/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: nexora-api-gateway
    ports:
      - "3005:3005"
    environment:
      GATEWAY_PORT: 3005
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      AUTH_SERVICE_URL: http://auth-service:3001
      HR_SERVICE_URL: http://hr-service:3010
      ATTENDANCE_SERVICE_URL: http://attendance-service:3011
      LEAVE_SERVICE_URL: http://leave-service:3012
      AI_SERVICE_URL: http://ai-service:3080
      CHAT_SERVICE_URL: http://chat-service:3002
      CALLING_SERVICE_URL: http://calling-service:3051
      MEDIA_SERVICE_URL: http://media-service:3052
      NOTIFICATION_SERVICE_URL: http://notification-service:3053
      POLICY_SERVICE_URL: http://policy-service:3013
      PROJECT_SERVICE_URL: http://project-service:3020
      TASK_SERVICE_URL: http://task-service:3021
      PAYROLL_SERVICE_URL: http://payroll-service:3014
      BENCH_SERVICE_URL: http://bench-service:3030
      ASSET_SERVICE_URL: http://asset-service:3031
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:3032
      HELPDESK_SERVICE_URL: http://helpdesk-service:3033
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3100,http://192.168.1.21:3000,http://192.168.1.21:3003,http://192.168.1.21:3005,http://192.168.1.21:3100,http://192.168.29.218:3000,http://192.168.29.218:3003,http://192.168.29.218:3005,http://192.168.29.218:3100
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-100}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
    depends_on:
      auth-service:
        condition: service_started
      hr-service:
        condition: service_healthy
      attendance-service:
        condition: service_healthy
      leave-service:
        condition: service_healthy
      policy-service:
        condition: service_healthy
      calling-service:
        condition: service_started
      project-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3005/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Frontend runs locally via `cd frontend && npm run dev`
  # See frontend/.env.local for API URLs pointing to localhost

  # Internal Helpdesk Service
  helpdesk-service:
    build:
      context: ./services/helpdesk-service
      dockerfile: Dockerfile
    container_name: nexora-helpdesk-service
    ports:
      - "3043:3033"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HELPDESK_SERVICE_PORT: 3033
      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/nexora_helpdesk?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3033/api/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.29.218:3005
        NEXT_PUBLIC_CHAT_SOCKET_URL: http://192.168.29.218:3002
        NEXT_PUBLIC_CALL_SOCKET_URL: http://192.168.29.218:3051
    container_name: nexora-frontend
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
    networks:
      - nexora-network
    restart: unless-stopped

  # Development Tools
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexora-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - nexora-network
    restart: unless-stopped

networks:
  nexora-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
