# =============================================================================
# Nexora — Modular Monolith stack
# =============================================================================
# Replaces the previous 18-microservices + api-gateway topology with a single
# `api` container that hosts all 17 application modules (auth, hr, payroll,
# attendance, leave, policy, task, project, chat, calling, notification,
# media, asset, bench, helpdesk, knowledge, ai).
#
# The 18 legacy *-service entries previously in this file have been removed.
# Their source still lives on disk under services/<name>-service/ as a code
# reference. To run the old 18-service stack, check out the `microservices`
# branch or the `v18-microservices-final` tag.
# =============================================================================

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: nexora-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: nexora_dev_password
    volumes:
      - ./data/mongodb-data:/data/db
      - ./infrastructure/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - nexora-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: nexora-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis-data:/data
    networks:
      - nexora-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── The Monolith ─────────────────────────────────────────────────────────
  # All 17 application modules in one container. The frontend hits this
  # directly at http://localhost:3015 (or http://api:3000 from inside the
  # docker network).
  #
  # Note on the *_SERVICE_URL env vars below: payroll's ExternalServicesService
  # still does HTTP roundtrips to fetch hr/auth/attendance/leave/policy data
  # (legacy code that hasn't been refactored to inject the public-API tokens
  # yet). Pointing those URLs back at the monolith itself (`http://api:3000`)
  # makes the calls a small in-network loopback — same data, same JWTs, no
  # external services required. The proper public-API refactor is queued.
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: nexora-api
    ports:
      - "3015:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000

      MONGODB_URI: mongodb://root:nexora_dev_password@mongodb:27017/?authSource=admin
      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-key-change-in-production-12345}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}

      # OAuth / SAML — placeholders are harmless because strategies only
      # fire on the OAuth/SAML routes themselves.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3015/api/v1/auth/google/callback}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-placeholder}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-placeholder}
      MICROSOFT_CALLBACK_URL: ${MICROSOFT_CALLBACK_URL:-http://localhost:3015/api/v1/auth/microsoft/callback}
      SAML_ENTRY_POINT: ${SAML_ENTRY_POINT:-http://placeholder}
      SAML_ISSUER: ${SAML_ISSUER:-nexora-saml}
      SAML_CALLBACK_URL: ${SAML_CALLBACK_URL:-http://localhost:3015/api/v1/auth/saml/callback}
      SAML_CERT: ${SAML_CERT:-placeholder}

      # OTP email
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-noreply@nexora.io}

      # Front-channel URL (auth invite emails)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3100}

      # Self-loopback URLs for payroll's ExternalServicesService.
      # Every legacy "*_SERVICE_URL" now points at the monolith's own
      # internal hostname so HTTP calls roundtrip back to the same
      # routes within this container. JWT validation succeeds because
      # the token signing secret is shared (it's a single process).
      AUTH_SERVICE_URL: http://api:3000
      HR_SERVICE_URL: http://api:3000
      ATTENDANCE_SERVICE_URL: http://api:3000
      LEAVE_SERVICE_URL: http://api:3000
      POLICY_SERVICE_URL: http://api:3000
      AI_SERVICE_URL: http://api:3000

      # Media S3 / MinIO
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-nexora-media}

      # AI module
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}

      # OTP rate limiting
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-20}
      OTP_LOCKOUT_MINUTES: ${OTP_LOCKOUT_MINUTES:-2}
      OTP_RATE_LIMIT_PER_HOUR: ${OTP_RATE_LIMIT_PER_HOUR:-100}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-1}

      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - nexora-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/api/v1/health/ready || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────────────
  # Now points directly at the monolith on :3015 (was kong gateway :3005).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # All API + WS traffic now flows through the monolith. Update the
        # IP/hostname here to whatever your laptop / dev box is reachable
        # at from the device running the browser (192.168.x.y on a LAN,
        # `localhost` if you only access from the same machine).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3015}
        NEXT_PUBLIC_CHAT_SOCKET_URL: ${NEXT_PUBLIC_CHAT_SOCKET_URL:-http://localhost:3015}
        NEXT_PUBLIC_CALL_SOCKET_URL: ${NEXT_PUBLIC_CALL_SOCKET_URL:-http://localhost:3015}
    container_name: nexora-frontend
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
    networks:
      - nexora-network
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ─── Dev Tooling ──────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexora-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - nexora-network
    restart: unless-stopped

networks:
  nexora-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
